<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Teste Formulário</h1>

    <form action="cadastro.php" method="get" autocomplete="on">

        <p>
            <label for="nome">Nome</label>
            <input type="text" name="nome" id="nome" placeholder="Nome Completo" autocomplete="name" required maxlength="30">
        </p>

        <p>
            <label for="media">Média</label>
            <input type="number" name="media" id="media" placeholder="Média" min="0" max="10" step="0.1" required>
        </p>

        <p>
            <label for="periodo">Período Letivo</label>
            <input type="month" name="periodo" id="periodo" required>
        </p>

        <button type="submit" value="Enviar">Enviar</button>
        <button type="reset" value="Limpar">Limpar</button>

    </form>
</body>
</html>
