<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible box</title>

    <style>
        h1{
            font-family: Arial, Helvetica, sans-serif;
            text-shadow: 1px 1px rgba(0, 0, 0, 0.416);
            text-align: center;
            margin-bottom: 40px;
        }

         div.conteiner{
            background-color: lightsalmon;
            display: flex;
            border-radius: 20px;
            flex-wrap: wrap;
            width: 80vw;
            margin: auto;
         }

         div.item{
            background-color: lightblue;
            border: 1.5px solid black;
            height: 200px;
            width: 200px;
            border-radius: 10px;
            margin: 10px;
            flex: auto;
            text-align: center;
            padding: 20px;
         }
    </style>

</head>
<body>
    <h1>Flexbox</h1>

    <div class="conteiner">
        <div class="item"><h1>A</h1></div>
        <div class="item"><h1>B</h1></div>
        <div class="item"><h1>C</h1></div>
        <div class="item"><h1>D</h1></div>
        <div class="item"><h1>E</h1></div>
    </div>
</body>
</html>
