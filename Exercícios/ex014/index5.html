<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio</title>

    <style>
        table{
            width: 350px;
            border-collapse: collapse;
        }

        thead{
            background-color: gray;
        }

        .cabecalho{
            background-color: gray;
            color: white;
        }

        th, td{
            border: 1px solid black;
            text-align: center;
            padding: 7px;
        }

        #container{
            overflow-x: auto;
        }
    </style>

</head>
<body>
    <div id="container">
        <table>
            <thead>
                <tr>
                    <th scope="col" rowspan="2" class="cabecalho">Área</th>
                    <th scope="col" rowspan="2" class="cabecalho">Disciplinas</th>
                    <th scope="colgroup" colspan="2" class="cabecalho">Notas</th>
                    <th scope="col" rowspan="2" class="cabecalho">Média</th>
                </tr>
                <tr>
                    <th scope="col" class="cabecalho">Nota 1</th>
                    <th scope="col" class="cabecalho">Nota 2</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <th rowspan="4" scope="rowgroup">Exatas</th>
                    <td>Matemática</td>
                    <td>0.0</td>
                    <td>0.0</td>
                    <td>0.0</td>
                </tr>
                <tr>
                    <td>Física</td>
                    <td>0.0</td>
                    <td>0.0</td>
                    <td>0.0</td>
                </tr>
                <tr>
                    <td>Química</td>
                    <td>0.0</td>
                    <td>0.0</td>
                    <td>0.0</td>
                </tr>
                <tr>
                    <td>Biologia</td>
                    <td>0.0</td>
                    <td>0.0</td>
                    <td>0.0</td>
                </tr>
                <tr>
                    <th scope="row" colspan="4" class="cabecalho">Média de Exatas</th>
                    <td class="cabecalho">0.0</td>
                </tr>
                <tr>
                    <th rowspan="2" scope="rowgroup">Humanas</th>
                    <td>História</td>
                    <td>0.0</td>
                    <td>0.0</td>
                    <td>0.0</td>
                </tr>
                <tr>
                    <td>Geografia</td>
                    <td>0.0</td>
                    <td>0.0</td>
                    <td>0.0</td>
                </tr>
                <tr>
                    <th scope="row" colspan="4" class="cabecalho">Média de Humanas</th>
                    <td class="cabecalho">0.0</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
